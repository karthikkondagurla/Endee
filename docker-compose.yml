# ─────────────────────────────────────────────────────────────────────────────
# Pigeon × Endee — Full Stack Docker Compose
# Services: pigeon-app (Next.js) + endee-oss (vector database)
#
# Quick start:
#   ./setup.sh          → first-time setup (builds images)
#   docker compose up -d → start everything
#   make help           → show all dev commands
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Endee Vector Database ──────────────────────────────────────────────────
  endee-oss:
    image: endee-oss:latest
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        # Detect arch automatically; override with: BUILD_ARCH=neon docker compose build
        BUILD_ARCH: ${BUILD_ARCH:-avx2}
        DEBUG: "false"
    container_name: endee-oss
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""          # Set in .env.local for production
    volumes:
      - endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

  # ── Pigeon Next.js App ─────────────────────────────────────────────────────
  pigeon-app:
    image: pigeon-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pigeon-app
    ports:
      - "3000:3000"
    depends_on:
      endee-oss:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Endee reference via Docker service name (internal networking)
      ENDEE_URL: http://endee-oss:8080/api/v1
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CRON_SECRET: ${CRON_SECRET:-change-me-in-production}
      DIGEST_TOPICS: ${DIGEST_TOPICS:-artificial intelligence,startups,climate tech,finance,geopolitics}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  endee-data:
